name: womens_health
description: A women's health Flutter app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.4
  flutter_dotenv: ^5.1.0
  provider: ^6.1.5
  table_calendar: ^3.1.2
  shared_preferences: ^2.1.0
  http: ^1.2.2





  url_launcher: ^6.2.2 # Используйте актуальную версию

  # --- ИЗМЕНЕНИЕ 1: Обновлена версия 'intl' до ^0.20.2 для устранения конфликта с flutter_localizations ---
  intl: ^0.20.2

  # --- ИЗМЕНЕНИЕ 2: Объединены пакеты локализации и добавлены пояснения ---
  flutter_localizations: # Обеспечивает поддержку встроенных виджетов Flutter на разных языках
    sdk: flutter


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
